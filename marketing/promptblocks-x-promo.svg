<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">PromptBlocks X promotion image</title>
  <desc id="desc">PromptBlocks: プロンプトを選んで作る。用途と条件を選ぶだけ。</desc>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
        letter-spacing: 0;
      }
      .headline {
        font-size: 74px;
        font-weight: 800;
        fill: #1f252b;
      }
      .body {
        font-size: 26px;
        font-weight: 600;
        fill: #4f5862;
      }
      .small {
        font-size: 18px;
        font-weight: 700;
        fill: #67717c;
      }
      .label {
        font-size: 17px;
        font-weight: 800;
        fill: #1f252b;
      }
      .chip {
        font-size: 17px;
        font-weight: 800;
        fill: #2458d6;
      }
      .card-text {
        font-size: 19px;
        font-weight: 800;
        fill: #22282f;
      }
      .muted {
        font-size: 15px;
        font-weight: 700;
        fill: #77818a;
      }
      .prompt {
        font-size: 17px;
        font-weight: 650;
        fill: #303741;
      }
    </style>
  </defs>

  <rect width="1200" height="675" fill="#f7f7f2"/>
  <path d="M0 610 C165 568 316 640 480 598 C650 555 779 561 950 610 C1061 641 1144 626 1200 592 L1200 675 L0 675 Z" fill="#e9efe9"/>
  <circle cx="1045" cy="118" r="92" fill="#dce9ff"/>
  <circle cx="1030" cy="121" r="62" fill="#f7f7f2"/>
  <rect x="74" y="78" width="190" height="48" rx="24" fill="#e9efff"/>
  <text x="103" y="109" class="chip">PromptBlocks</text>

  <text x="72" y="205" class="headline">プロンプトを</text>
  <text x="72" y="290" class="headline">選んで作る</text>
  <text x="76" y="357" class="body">用途と条件を選ぶだけ。</text>
  <text x="76" y="396" class="body">AIに伝わる形へ整えます。</text>

  <g transform="translate(74 450)">
    <rect width="88" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="27" y="26" class="small">メール</text>
  </g>
  <g transform="translate(176 450)">
    <rect width="88" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="27" y="26" class="small">要約</text>
  </g>
  <g transform="translate(278 450)">
    <rect width="88" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="27" y="26" class="small">企画</text>
  </g>
  <g transform="translate(380 450)">
    <rect width="88" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="27" y="26" class="small">学習</text>
  </g>
  <g transform="translate(74 508)">
    <rect width="118" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="28" y="26" class="small">SNS投稿</text>
  </g>
  <g transform="translate(206 508)">
    <rect width="134" height="40" rx="20" fill="#ffffff" stroke="#d9ded8"/>
    <text x="30" y="26" class="small">相談整理</text>
  </g>
  <g transform="translate(74 581)">
    <rect width="230" height="48" rx="24" fill="#2458d6"/>
    <text x="30" y="31" font-size="18" font-weight="800" fill="#ffffff">完成プロンプトをコピー</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="612" y="68" width="514" height="540" rx="30" fill="#ffffff"/>
  </g>
  <rect x="612" y="68" width="514" height="540" rx="30" fill="#ffffff" stroke="#e1e5df"/>

  <g transform="translate(648 104)">
    <circle cx="13" cy="13" r="6" fill="#ff6b5f"/>
    <circle cx="35" cy="13" r="6" fill="#f6c85f"/>
    <circle cx="57" cy="13" r="6" fill="#62c66a"/>
    <rect x="300" y="0" width="140" height="32" rx="16" fill="#f0f5ff"/>
    <text x="321" y="22" class="muted" fill="#2458d6">具体度 90%</text>
  </g>

  <text x="650" y="182" class="label">用途</text>
  <g transform="translate(650 207)">
    <rect width="194" height="58" rx="16" fill="#f3f7ff" stroke="#c8d8ff"/>
    <text x="20" y="37" class="card-text">メールを整える</text>
  </g>
  <g transform="translate(860 207)">
    <rect width="194" height="58" rx="16" fill="#fbfbf7" stroke="#dce1d8"/>
    <text x="28" y="37" class="card-text">長文を要約</text>
  </g>
  <g transform="translate(650 279)">
    <rect width="194" height="58" rx="16" fill="#fbfbf7" stroke="#dce1d8"/>
    <text x="48" y="37" class="card-text">SNS投稿</text>
  </g>
  <g transform="translate(860 279)">
    <rect width="194" height="58" rx="16" fill="#fbfbf7" stroke="#dce1d8"/>
    <text x="44" y="37" class="card-text">相談を整理</text>
  </g>

  <text x="650" y="383" class="label">条件</text>
  <g transform="translate(650 407)">
    <rect width="93" height="40" rx="20" fill="#eef6ef"/>
    <text x="28" y="26" class="small" fill="#2e7a4f">丁寧</text>
  </g>
  <g transform="translate(755 407)">
    <rect width="128" height="40" rx="20" fill="#eef6ef"/>
    <text x="27" y="26" class="small" fill="#2e7a4f">短めに</text>
  </g>
  <g transform="translate(895 407)">
    <rect width="132" height="40" rx="20" fill="#eef6ef"/>
    <text x="25" y="26" class="small" fill="#2e7a4f">箇条書き</text>
  </g>

  <text x="650" y="490" class="label">完成プロンプト</text>
  <rect x="650" y="512" width="404" height="64" rx="18" fill="#f7f7f2" stroke="#dce1d8"/>
  <text x="673" y="539" class="prompt">相手に失礼がないように、</text>
  <text x="673" y="564" class="prompt">要点が伝わる返信文に整えて。</text>
</svg>
